specVersion: "4.0"
metadata:
  name: cds.plugin.caching.dashboard
type: application
framework:
  name: SAPUI5
  version: "1.136.1"
  libraries:
    - name: sap.m
    - name: sap.f
    - name: sap.ui.comp
    - name: sap.tnt
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.ui.unified
    - name: sap.viz
    - name: themelib_sap_horizon
builder:
  resources:
    excludes:
      - "test/e2e/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        transformTypeScript: true
        omitTSFromBuildResult: true
